# OpenSSF Security Insights (https://github.com/ossf/security-insights-spec)
# Machine-readable security metadata for the Console7 repository. Schema v2.0.0
# (spec v2.2.0). Validate with the official tooling (ossf/si-tooling / `cue vet`)
# in CI before relying on it.
header:
  schema-version: 2.0.0
  last-updated: '2026-06-19'
  last-reviewed: '2026-06-19'
  url: https://github.com/console7/console7/blob/main/SECURITY-INSIGHTS.yml
  comment: |
    Console7 is a Tier-1, public, self-hosted control plane. It governs itself per
    docs/standards/console7-sdlc-standard.md — a 19-control-objective tailoring bound
    to the OpenSSF baseline.

project:
  name: Console7
  homepage: https://github.com/console7/console7
  roadmap: https://github.com/console7/console7/blob/main/docs/ROADMAP.md
  administrators:
    - name: Console7 maintainers
      affiliation: Console7
      email: security@naanya.biz
      primary: true
  documentation:
    code-of-conduct: https://github.com/console7/console7/blob/main/CODE_OF_CONDUCT.md
  repositories:
    - name: console7
      url: https://github.com/console7/console7
      comment: |
        Monorepo core: control plane, key broker, sandbox, SDK, providers, docs.
  vulnerability-reporting:
    reports-accepted: true
    bug-bounty-available: false
    contact:
      name: Console7 security
      email: security@naanya.biz
      primary: true
    policy: https://github.com/console7/console7/blob/main/SECURITY.md
    comment: |
      Report privately via GitHub Security Advisories or security@naanya.biz. Do not
      open public issues for vulnerabilities.

repository:
  url: https://github.com/console7/console7
  status: active
  bug-fixes-only: false
  accepts-change-request: true
  accepts-automated-change-request: true
  no-third-party-packages: true
  core-team:
    - name: Console7 maintainers
      affiliation: Console7
      email: security@naanya.biz
      primary: true
  documentation:
    contributing-guide: https://github.com/console7/console7/blob/main/CONTRIBUTING.md
    governance: https://github.com/console7/console7/blob/main/GOVERNANCE.md
    security-policy: https://github.com/console7/console7/blob/main/SECURITY.md
    dependency-management-policy: https://github.com/console7/console7/blob/main/docs/standards/console7-sdlc-standard.md
  license:
    url: https://github.com/console7/console7/blob/main/LICENSE
    expression: Apache-2.0
  security:
    assessments:
      self:
        evidence: https://github.com/console7/console7/blob/main/docs/standards/console7-sdlc-standard.md
        date: '2026-06-19'
        comment: |
          The Console7 Repository SDLC Standard is the controlled self-assessment of
          the control posture, bound to the OpenSSF baseline (Scorecard, OSPS Level 3
          and Best Practices Badge silver as targets).
    tools:
      - name: Socket
        type: SCA
        integration:
          adhoc: false
          ci: true
          release: false
        comment: |
          Socket scans dependency-changing PRs; Socket Firewall routes installs. Plus
          Dependabot, gitleaks (full-history secret scan), the CO-12.7 agentic-artifact
          provenance gate, and a DCO gate. CodeQL (SAST) and govulncheck activate when
          Go code lands.
