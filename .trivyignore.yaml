# evidence/main.tf AVD-GCP-0077, R-2.)
misconfigurations:
  - id: AVD-KSV-0125
    paths:
      - "modules/egress-proxy/proxy.yaml"
    statement: "RISKS R-6: the Squid image is DIGEST-PINNED ubuntu/squid (Canonical-maintained); docker.io is not on trivy's default trusted-registry allowlist (a registry-trust heuristic, not a vulnerability). Adopters may mirror it into their in-tenancy Artifact Registry. All other Squid hardening (non-root, read-only root FS, dropped caps, seccomp) is applied, not suppressed."
