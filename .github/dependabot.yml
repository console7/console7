version: 2

# CO-5.5 — automated, tested dependency-update flow keeps pins current. Actions
# are pinned to commit SHAs; Dependabot bumps the SHA and updates the trailing
# version comment. The Go-modules stanza is ready to enable the moment go.mod
# lands (uncomment it then — keeping it commented avoids a "manifest not found"
# error until the module exists).

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

