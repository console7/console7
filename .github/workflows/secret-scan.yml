name: secret scan

# CO-8.1 — block secrets in source. gitleaks scans the working tree on every PR
# and push. This is the in-repo backstop to GitHub native secret-scanning +
# push-protection (enabled in repo settings). Blocking: a detection fails the job.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (working tree)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: gitleaks
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          # --no-git scans current files (deterministic baseline); full-history
          # scanning can be enabled once the history is known-clean.
          gitleaks detect --source . --no-git --redact --no-banner -c .gitleaks.toml
