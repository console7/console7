name: secret scan

# CO-8.1 — block secrets in source. gitleaks scans the full git history on every
# PR and push. This is the in-repo backstop to GitHub native secret-scanning +
# push-protection (enabled in repo settings). Blocking: a detection fails the job.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so a secret added-then-removed is still caught

      - name: gitleaks (checksum-verified)
        run: |
          VER=8.21.2
          SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          # Verify the release asset against a pinned digest before executing it —
          # a supply-chain gate must not itself run an unverified binary.
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          # Scan the full git history (not just the worktree) so a secret added
          # and later removed within the branch is still detected before merge.
          gitleaks detect --source . --redact --no-banner -c .gitleaks.toml
