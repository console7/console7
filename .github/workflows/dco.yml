name: dco

# CO-4 — Developer Certificate of Origin: every human-authored commit in a PR must
# carry a `Signed-off-by` trailer (git commit -s). Self-authored gate — no third-
# party DCO app dependency, consistent with our supply-chain stance. Bot authors
# (e.g. dependabot[bot], GitHub web-flow) are exempt: they cannot add a sign-off and
# are governed as supply-chain inputs (Socket / Dependabot / review), not as
# contributors asserting the DCO.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # read the PR commit list to identify bot authors by verified account type

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PR history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every human commit
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          # Identify bot-authored commits from the GitHub API, where author/committer .type == "Bot"
          # is SERVER-VERIFIED from the linked account — it cannot be forged via git author metadata.
          # The previous substring match on attacker-controlled %an/%ae let a PR author self-exempt by
          # setting user.name="x [bot]" or user.email="x+noreply@github.com". Fail closed: if the API
          # call fails, bot_shas is empty, so nothing is exempted and a genuine bot PR surfaces loudly
          # rather than a forged human commit slipping through.
          if ! bot_shas="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR}/commits" \
              --jq '.[] | select((.author.type=="Bot") or (.committer.type=="Bot")) | .sha')"; then
            echo "::warning::could not read PR commit authors from the API; exempting no commits (fail closed)"
            bot_shas=""
          fi
          is_bot() { printf '%s\n' "$bot_shas" | grep -qxF "$1"; }
          missing=0
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            if is_bot "$sha"; then
              echo "- $sha exempt (bot author per GitHub API)"
              continue
            fi
            if git show -s --format='%(trailers:key=Signed-off-by)' "$sha" | grep -q 'Signed-off-by:'; then
              echo "ok $sha — signed off"
            else
              # Strip CR/LF from author metadata before echoing: an author name/email containing a
              # newline could otherwise inject GitHub Actions workflow commands (::stop-commands::,
              # ::add-mask::) into the runner log/annotation stream.
              name="$(git show -s --format='%an' "$sha" | tr -d '\r\n')"
              email="$(git show -s --format='%ae' "$sha" | tr -d '\r\n')"
              echo "::error::commit $sha is missing a Signed-off-by (DCO). Author: ${name} <${email}>"
              missing=1
            fi
          done < <(git rev-list "$BASE".."$HEAD")
          if [ "$missing" -ne 0 ]; then
            echo "DCO failed — add a sign-off with 'git commit -s' (fix existing commits with: git rebase --signoff $BASE). See CONTRIBUTING.md."
            exit 1
          fi
          echo "DCO OK — all human commits signed off."
