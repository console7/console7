name: codeql (sast)

# CO-7.1 SAST. CodeQL is free for public repos (no GHAS needed for the
# Security tab on public repos). It is the app-code SAST gate. The repo has NO
# Go code yet, so the analyze job is GUARDED to skip cleanly until the first
# `.go` files land — at which point it activates automatically. No debt: the
# gate is wired now, dormant until it has something to scan.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1"

permissions:
  contents: read

jobs:
  detect:
    name: detect Go sources
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: detect
        run: |
          if find . -path ./vendor -prune -o -name '*.go' -print | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "No Go sources yet — CodeQL dormant (auto-activates when code lands)."
          fi

  analyze:
    name: analyze (go)
    needs: detect
    if: needs.detect.outputs.has_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: go
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
