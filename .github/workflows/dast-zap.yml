name: dast (zap baseline)

# CO-7.2 DAST — tracked target (standard §5 #5). There is no running service to
# scan yet, so this is a MANUAL scaffold (workflow_dispatch only): it never runs
# on PRs and stays dormant until a deployed endpoint exists. When a service
# lands, supply its URL via the `target` input (or wire a schedule). Report-only
# baseline first; authenticated/active scans follow per the standard trajectory.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target URL to scan (e.g. https://staging.example). Leave blank to no-op."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  zap-baseline:
    name: zap baseline (report-only)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@66042c8e7e24680119199a017e5b0e8603bf4dae # v0.12.0
        with:
          target: ${{ github.event.inputs.target }}
          cmd_options: "-I" # report-only: do not fail the job on warnings (baseline)
