name: dast (zap baseline)

# CO-7.2 DAST — tracked target (standard §5 #5). There is no running service to
# scan yet, so this is a MANUAL scaffold (workflow_dispatch only): it never runs
# on PRs and stays dormant until a deployed endpoint exists. When a service
# lands, supply its URL via the `target` input (or wire a schedule). Report-only
# baseline first; authenticated/active scans follow per the standard trajectory.
#
# Public-repo caveat (raised in review): the ZAP action uploads its scan report as
# a workflow artifact, which is world-readable on a public repo. Before running
# this against a real (esp. pre-release/staging) target, treat the findings + URL
# as published — run only against targets whose results are safe to disclose, or
# relocate the report to a private store. allow_issue_writing is disabled so the
# scan does not fail under the read-only token.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target URL to scan (e.g. https://staging.example). Leave blank to no-op."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  zap-baseline:
    name: zap baseline (report-only)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ github.event.inputs.target }}
          cmd_options: "-I" # report-only: do not fail the job on warnings (baseline)
          allow_issue_writing: false # token is contents:read only; do not attempt issue writes
          fail_action: false # report-only scaffold
