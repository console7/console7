name: governance gate

# CO-12.7 / CO-12.8 — agentic-artifact supply-chain provenance, under the
# Console7 Repository SDLC Standard (docs/standards/console7-sdlc-standard.md).
# BLOCKING: the script fails closed (exit 1) on any violation. There is
# intentionally no continue-on-error — a governance gate that can't fail is
# worthless.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  provenance:
    name: CO-12.7 agentic-artifact provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: First-party / self-authored skills, agents, hooks only
        run: scripts/audit-skill-provenance.sh
