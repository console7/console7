name: terraform (fmt · validate · trivy)

# CO-05 / CO-12.7 — IaC quality + security gate for deploy/ Terraform. Per CLAUDE.md
# and the SDLC standard: SHA-pinned actions, least privilege, pinned tool versions.
# Guarded on the presence of deploy/gcp/*.tf so it activates when the module lands and
# skips cleanly otherwise. Misconfiguration scanning uses Trivy config — the maintained
# successor to tfsec (same Terraform check set).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect terraform
    runs-on: ubuntu-latest
    outputs:
      has_tf: ${{ steps.detect.outputs.has_tf }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: detect
        run: |
          if ls deploy/gcp/*.tf >/dev/null 2>&1; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
          fi

  terraform:
    name: fmt · validate · trivy
    needs: detect
    if: needs.detect.outputs.has_tf == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: fmt
        run: terraform fmt -check -recursive deploy/gcp

      - name: init (no backend)
        run: terraform -chdir=deploy/gcp init -backend=false

      - name: validate
        run: terraform -chdir=deploy/gcp validate

      - name: trivy config
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0 # pin the scanner binary — do not float to latest
          scan-type: config
          scan-ref: deploy/gcp
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          hide-progress: true
          # Path-scoped misconfig ignores (mirrored in docs/RISKS.md). YAML form (not the line-based
          # .trivyignore) so a suppression is bound to a specific file, never a blanket ID — trivy does
          # not auto-load the .yaml variant, so it is named explicitly. Terraform findings stay inline.
          trivyignores: .trivyignore.yaml
