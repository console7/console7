name: go (build · vet · test · cover · lint · fmt)

# CO-15 / CO-17 — Go build, vet, test, coverage-floor, lint, and format gates.
# CLAUDE.md and the SDLC standard (docs/standards/console7-sdlc-standard.md) make
# these CI-gated the moment Go lands. CO-17 specifically requires golangci-lint wired
# as a blocking gate once go.mod exists; the `lint` job below closes that gap (see
# docs/dev/code-quality-enforcement-plan.md). All jobs are guarded on the presence of
# go.mod so they skip cleanly until the module exists, then activate automatically.
# SHA-pinned actions, least-privilege.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect sources
    runs-on: ubuntu-latest
    outputs:
      has_gomod: ${{ steps.detect.outputs.has_gomod }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: detect
        run: |
          if [ -f go.mod ]; then
            echo "has_gomod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gomod=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — Go gate dormant (auto-activates when the module lands)."
          fi

  check:
    name: build · vet · test · cover · gofmt
    needs: detect
    if: needs.detect.outputs.has_gomod == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt (formatting gate)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            echo "----- gofmt -d (apply this diff) -----"
            gofmt -d .
            exit 1
          fi
          echo "gofmt: clean."

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test + coverage floors
        run: ./scripts/coverage-gate.sh coverage.out

  lint:
    name: golangci-lint (clean-as-you-code)
    needs: detect
    # Clean-as-you-code: the gate judges lines this PR changed, comparing against the
    # base branch (--new-from-rev). The legacy baseline is grandfathered until the
    # one-off remediation lands, after which this flips to whole-tree enforcement
    # (Sprint 3 of the enforcement plan). It is therefore a PR-only gate — main is
    # protected, so every change arrives through a PR check; a push-to-main re-run
    # would have no diff base during the grandfather window.
    if: needs.detect.outputs.has_gomod == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the base revision is reachable for the diff

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint (pinned, built from checksum-verified source)
        # Built from source via the module proxy + Go checksum database rather than a
        # downloaded binary or a third-party action — same supply-chain posture as the
        # govulncheck job (dep-scan.yml). Pin the version; do not float to latest.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Lint changed lines (vs merge-base)
        # base_ref is the PR target branch; route it through env rather than inlining
        # the ${{ }} expression into the shell (script-injection hygiene / actionlint).
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          if ! git rev-parse --verify --quiet "origin/$BASE_REF" >/dev/null; then
            echo "::error::base ref origin/$BASE_REF not resolvable after fetch"
            exit 1
          fi
          # --new-from-merge-base diffs against the common ancestor, so the gate judges
          # exactly the lines this PR added — not unrelated churn that landed on the
          # base branch after the PR was cut (which --new-from-rev would fold in).
          golangci-lint run --new-from-merge-base="origin/$BASE_REF" ./...
