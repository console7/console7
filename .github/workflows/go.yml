name: go (build · vet · test · cover · lint · fmt)

# CO-15 / CO-17 — Go build, vet, test, coverage-floor, lint, and format gates.
# CLAUDE.md and the SDLC standard (docs/standards/console7-sdlc-standard.md) make
# these CI-gated the moment Go lands. CO-17 specifically requires golangci-lint wired
# as a blocking gate once go.mod exists; the `lint` job below closes that gap (see
# docs/dev/code-quality-enforcement-plan.md). All jobs are guarded on the presence of
# go.mod so they skip cleanly until the module exists, then activate automatically.
# SHA-pinned actions, least-privilege.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect sources
    runs-on: ubuntu-latest
    outputs:
      has_gomod: ${{ steps.detect.outputs.has_gomod }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: detect
        run: |
          if [ -f go.mod ]; then
            echo "has_gomod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gomod=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — Go gate dormant (auto-activates when the module lands)."
          fi

  check:
    name: build · vet · test · cover · gofmt
    needs: detect
    if: needs.detect.outputs.has_gomod == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: gofmt (formatting gate)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            echo "----- gofmt -d (apply this diff) -----"
            gofmt -d .
            exit 1
          fi
          echo "gofmt: clean."

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The c7_live production wiring (control-plane/ui/cmd/c7/wire_production.go) is behind a build
      # tag and is never RUN in CI (it needs a real tenancy), so a default build/test would not catch
      # it bit-rotting against a provider/interface change. Compile it explicitly so it can't.
      - name: go build -tags c7_live (production wiring compiles)
        run: go build -tags c7_live ./...

      - name: go test + coverage floors
        run: ./scripts/coverage-gate.sh coverage.out

  lint:
    name: golangci-lint (whole-tree)
    needs: detect
    # Whole-tree enforcement: the entire tree must pass .golangci.yml, not just the
    # lines a PR changed. The one-off remediation (enforcement plan Sprint 2) brought
    # the legacy baseline to zero issues, which closed the grandfather window — so the
    # clean-as-you-code (--new-from-merge-base) phase is retired and legacy debt can no
    # longer creep back in under the diff filter. Runs on PR and on push (main is clean,
    # so a push-to-main re-run is meaningful, not spuriously red).
    if: needs.detect.outputs.has_gomod == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint (pinned, built from checksum-verified source)
        # Built from source via the module proxy + Go checksum database rather than a
        # downloaded binary or a third-party action — same supply-chain posture as the
        # govulncheck job (dep-scan.yml). Pin the version; do not float to latest.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Lint (whole tree)
        run: golangci-lint run ./...

      # Lint the c7_live production wiring too (the default run does not see build-tagged files), so a
      # lint regression in wire_production.go is caught even though it is never run in CI.
      - name: Lint (c7_live build tag)
        run: golangci-lint run --build-tags c7_live ./...
