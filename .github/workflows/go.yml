name: go (build · vet · test · fmt)

# CO-15 / CO-17 — Go build, vet, test, and format gate. CLAUDE.md and the SDLC
# standard (docs/standards/console7-sdlc-standard.md) make these CI-gated the moment
# Go lands. Guarded on the presence of go.mod so it skips cleanly until the module
# exists, then activates automatically. SHA-pinned actions, least-privilege.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: detect sources
    runs-on: ubuntu-latest
    outputs:
      has_gomod: ${{ steps.detect.outputs.has_gomod }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: detect
        run: |
          if [ -f go.mod ]; then
            echo "has_gomod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gomod=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — Go gate dormant (auto-activates when the module lands)."
          fi

  check:
    name: build · vet · test · gofmt
    needs: detect
    if: needs.detect.outputs.has_gomod == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt (formatting gate)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            echo "----- gofmt -d (apply this diff) -----"
            gofmt -d .
            exit 1
          fi
          echo "gofmt: clean."

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
