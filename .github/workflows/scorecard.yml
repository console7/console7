name: openssf scorecard

# OpenSSF Scorecard (standard §3) — kept UNPUBLISHED for now: publish_results is
# false, so there is no public Scorecard-API listing and no README badge.
#
# Public-repo reality (raised in review): GitHub Actions logs AND artifacts on a
# public repo are world-readable, so there is no "private" persisted output to be
# had here. We therefore (a) do NOT upload an artifact — an earlier version did,
# which is falsely-private — and (b) run on-demand only (workflow_dispatch), so we
# are not emitting routine public run logs on every push. Read the score in the
# manually-triggered run's log. When we choose to share (standard §3 trajectory),
# flip publish_results: true, add a badge, AND pin the runtime image by digest:
# the action's metadata at this revision launches gcr.io/openssf/scorecard-action
# via a mutable tag, so SHA-pinning the wrapper alone does not fully pin the
# executed image. Informational only; does not gate PRs.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: scorecard (on-demand, unpublished)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false # do not publish to the Scorecard API / badge yet

      - name: Print score summary to the (manually-triggered) run log
        run: |
          echo "Scorecard ran. Results are in this run log only (not uploaded)."
          # SARIF is verbose; surface the rule/score lines for a quick read.
          if [ -f scorecard-results.sarif ]; then
            grep -Eo '"id":"[^"]+"|"score":[0-9.]+' scorecard-results.sarif || true
          fi
