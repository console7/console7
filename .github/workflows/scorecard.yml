name: openssf scorecard

# OpenSSF Scorecard (standard §3). Results are kept PRIVATE for now: no publish
# to the public Scorecard API, no README badge — the SARIF is uploaded only as a
# workflow artifact, readable by maintainers. Publish + badge when there is
# something meaningful to share (standard §3 trajectory). This is informational;
# it does not gate PRs.

on:
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: scorecard (private)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false # keep private for now (standard §3)

      - name: Upload results (artifact only — not published)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30
